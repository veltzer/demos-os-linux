[vars]
kernel_excludes = [
  "/kernel/",
  "/kernel_standalone/"
]
no_single_excludes = [
  "/kernel/",
  "/kernel_standalone/",
  "/examples_standalone/",
  "/exercises_standalone/"
]
no_single_excludes_clang = [
  "/kernel/",
  "/kernel_standalone/",
  "/examples_standalone/",
  "/exercises_standalone/",
  "/openmp/"
]
no_single_excludes_clang_tidy = [
  "/kernel/",
  "/kernel_standalone/",
  "/examples_standalone/",
  "/exercises_standalone/",
  "/openmp/",
  "/libs/"
]

[processor.cc_single_file.gcc]
scan_dirs = ["src"]
include_paths = ["src/include"]
exclude_dirs = "${no_single_excludes}"
cc = "gcc"
cxx = "g++"
output_suffix = ".elf"
cflags = [
	"-O2",
	"-Wall",
	"-Werror",
	"-Wextra",
	"-pedantic",
]
cxxflags = [
	"-O2",
	"-Wall",
	"-Werror",
	"-Wextra",
	"-pedantic",
]

[processor.cc_single_file.clang]
scan_dirs = ["src"]
include_paths = ["src/include"]
exclude_dirs = "${no_single_excludes_clang}"
exclude_paths = [
	"src/examples/compiler_internals/varargs_size.cc",
	"src/examples/dynamic_linking/dlsym.cc",
	"src/examples/error_handling/longjmp.cc",
	"src/examples/error_handling/longjmp_with_stack_trace.cc",
	"src/examples/internationalization/wide_override.cc",
	"src/examples/memory_allocation/mcheck_free.cc",
	"src/examples/performance/instrument.cc",
	"src/examples/preprocessor/messages_during_compilation.cc",
]
cc = "clang"
cxx = "clang++"
cflags = [
	"-O2",
	"-Wall",
	"-Werror",
	"-Wextra",
	"-pedantic",
]
cxxflags = [
	"-O2",
	"-Wall",
	"-Werror",
	"-Wextra",
	"-pedantic",
]

[processor.cppcheck]
exclude_dirs = "${kernel_excludes}"
args = [
	"--error-exitcode=1",
	"--enable=warning,style,performance,portability",
	"--check-level=exhaustive",
	"--suppressions-list=.cppcheck-suppressions",
]

[processor.make]
exclude_paths = ["Makefile"]
exclude_dirs = "${kernel_excludes}"

[analyzer.cpp]
exclude_dirs = "${kernel_excludes}"
include_paths = [
	"src/include",
	"/usr/include/mysql++",
	"/usr/lib/x86_64-linux-gnu/wx/include/gtk3-unicode-3.2",
	"/usr/include/wx-3.2",
	"src/examples_standalone/gcc_precompiled_headers/include",
	"src/examples_standalone/quoted_includes/folder1",
	"/usr/lib/gcc/x86_64-linux-gnu/15/plugin/include",
]
pkg_config = [
	"gtk+-2.0",
	"gtkmm-2.4",
	"mysqlclient",
	"Qt6Widgets",
]
include_path_commands = [
]

[processor.clang_tidy]
scan_dirs = ["src"]
compiler_args = ["-Isrc/include"]
exclude_dirs = "${no_single_excludes_clang_tidy}"
exclude_paths = [
	"src/examples/compiler_internals/varargs_size.cc",
	"src/examples/dynamic_linking/dlsym.cc",
	"src/examples/error_handling/longjmp.cc",
	"src/examples/error_handling/longjmp_with_stack_trace.cc",
	"src/examples/internationalization/wide_override.cc",
	"src/examples/memory_allocation/mcheck_free.cc",
	"src/examples/performance/instrument.cc",
	"src/examples/preprocessor/messages_during_compilation.cc",
	"src/examples/multi_core/cache_line_pad.cc",
	"src/exercises/real_time/volatile_atomic_etc/solution.cc",
]

# cpplint: Google C++ style checker.
# By default cpplint looks for CPPLINT.cfg but we use --config to point
# to .cpplint so the config file doesn't clutter the project root.
# Filter rules are defined in .cpplint (not here) to keep this file clean.
[processor.cpplint]
exclude_dirs = "${kernel_excludes}"
args = ["--config=.cpplint"]
extra_inputs = [".cpplint"]

[processor.mdl]
scan_dirs = ["src"]

[processor.aspell]
scan_dirs = ["src"]

# [processor.checkpatch]
# scan_dirs = ["src/kernel"]
# args = ["--no-tree"]

[processor.rumdl]
scan_dirs = ["src"]

[processor.linux_module]
scan_dirs = ["src/kernel_standalone"]

[processor.cc]
scan_dirs = ["src"]

