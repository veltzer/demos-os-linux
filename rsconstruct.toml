[dependencies]
system = [
	# X11 / OpenGL
	"libx11-dev",
	"libxrandr-dev",
	"libgl-dev",
	"libglu1-mesa-dev",
	"libglx-dev",
	# GUI toolkits used by examples
	"libgtk2.0-dev",
	"libgtkmm-2.4-dev",
	"libsigc++-2.0-dev",
	"libwxgtk3.2-dev",
	"qt6-base-dev",
	"qtbase5-dev",
	"libsdl1.2-dev",
	"libwayland-dev",
	# networking / system libs
	"libace-dev",
	"libevent-dev",
	"libnetfilter-queue-dev",
	"libpcap-dev",
	# databases
	"libmysqlclient-dev",
	"libmysql++-dev",
	"libpq-dev",
	# logging / misc
	"liblog4cpp5-dev",
	"libdaemon-dev",
	"libiberty-dev",
	"libdialog-dev",
	# system-level
	"libncurses-dev",
	"libasound2-dev",
	"libcap-dev",
	"liburcu-dev",
	"libunwind-dev",
	"libdw-dev",
	"libelf-dev",
	"libsystemd-dev",
	"libcpufreq-dev",
	"libboost-all-dev",
	"libpapi-dev",
	"liburing-dev",
	"libaspell-dev",
	"libacl1-dev",
	"libattr1-dev",
	"libffi-dev",
	"libpopt-dev",
	"libxtables-dev",
	"libdmalloc-dev",
	"electric-fence",
	"libcds-dev",
	"binutils-dev",
	"systemtap-sdt-dev",
	# build helpers used by per-example Makefiles
	"uncrustify",
	"indent",
	"valgrind",
]
pip = [
	"pymakehelper",
]

[vars]
kernel_excludes = [
  "/kernel/",
  "/kernel_standalone/"
]
no_single_excludes = [
  "/kernel/",
  "/kernel_standalone/",
  "/examples_standalone/",
  "/exercises_standalone/"
]
no_single_excludes_clang = [
  "/kernel/",
  "/kernel_standalone/",
  "/examples_standalone/",
  "/exercises_standalone/",
  "/openmp/"
]
no_single_excludes_clang_tidy = [
  "/kernel/",
  "/kernel_standalone/",
  "/examples_standalone/",
  "/exercises_standalone/",
  "/openmp/",
  "/libs/"
]

[processor.cc_single_file.gcc]
src_dirs = ["src"]
src_exclude_dirs = "${no_single_excludes}"
include_paths = ["src/include"]
cc = "gcc"
cxx = "g++"
output_suffix = ".elf"
cflags = [
	"-O2",
	"-Wall",
	"-Werror",
	"-Wextra",
	"-pedantic",
]
cxxflags = [
	"-O2",
	"-Wall",
	"-Werror",
	"-Wextra",
	"-pedantic",
]

[processor.cc_single_file.clang]
src_dirs = ["src"]
src_exclude_dirs = "${no_single_excludes_clang}"
src_exclude_paths = [
	"src/examples/compiler_internals/varargs_size.cc",
	"src/examples/dynamic_linking/dlsym.cc",
	"src/examples/error_handling/longjmp.cc",
	"src/examples/error_handling/longjmp_with_stack_trace.cc",
	"src/examples/internationalization/wide_override.cc",
	"src/examples/memory_allocation/mcheck_free.cc",
	"src/examples/performance/instrument.cc",
	"src/examples/preprocessor/messages_during_compilation.cc",
]
include_paths = ["src/include"]
cc = "clang"
cxx = "clang++"
cflags = [
	"-O2",
	"-Wall",
	"-Werror",
	"-Wextra",
	"-pedantic",
]
cxxflags = [
	"-O2",
	"-Wall",
	"-Werror",
	"-Wextra",
	"-pedantic",
]

[processor.cppcheck]
src_exclude_dirs = "${kernel_excludes}"
args = [
	"--error-exitcode=1",
	"--enable=warning,style,performance,portability",
	"--check-level=exhaustive",
	"--suppressions-list=.cppcheck-suppressions",
]

[processor.make]
src_dirs = ["src"]
src_exclude_paths = ["Makefile"]
src_exclude_dirs = "${kernel_excludes}"

[analyzer.icpp]
src_exclude_dirs = "${kernel_excludes}"
include_paths = [
	"src/include",
	"/usr/include/mysql++",
	"/usr/lib/x86_64-linux-gnu/wx/include/gtk3-unicode-3.2",
	"/usr/include/wx-3.2",
	"src/examples_standalone/gcc_precompiled_headers/include",
	"src/examples_standalone/quoted_includes/folder1",
	"/usr/lib/gcc/x86_64-linux-gnu/15/plugin/include",
]
pkg_config = [
	"gtk+-2.0",
	"gtkmm-2.4",
	"mysqlclient",
	"Qt6Widgets",
]

[processor.clang_tidy]
src_dirs = ["src"]
compiler_args = ["-Isrc/include"]
src_exclude_dirs = "${no_single_excludes_clang_tidy}"
src_exclude_paths = [
	"src/examples/compiler_internals/varargs_size.cc",
	"src/examples/dynamic_linking/dlsym.cc",
	"src/examples/error_handling/longjmp.cc",
	"src/examples/error_handling/longjmp_with_stack_trace.cc",
	"src/examples/internationalization/wide_override.cc",
	"src/examples/memory_allocation/mcheck_free.cc",
	"src/examples/performance/instrument.cc",
	"src/examples/preprocessor/messages_during_compilation.cc",
	"src/examples/multi_core/cache_line_pad.cc",
	"src/exercises/real_time/volatile_atomic_etc/solution.cc",
]

[processor.cpplint]
src_dirs = ["src"]
src_exclude_dirs = "${kernel_excludes}"
args = ["--config=.cpplint"]
dep_inputs = [".cpplint"]

[processor.mdl]
src_dirs = ["src"]

[processor.rumdl]
src_dirs = ["src"]

[processor.zspell]
src_dirs = ["src"]

# [processor.checkpatch]
# src_dirs = ["src/kernel"]
# args = ["--no-tree"]

[processor.linux_module]
src_dirs = ["src/kernel_standalone"]

[processor.cc]
src_dirs = ["src"]

[processor.script.check_all]
enabled=false
command = "scripts/check_all.py"
src_extensions = [".c", ".cc"]
src_dirs = ["src"]
batch = true

[processor.taplo]
src_dirs = [] 

[processor.iyamllint]
src_dirs = []

[processor.mypy]
src_dirs = ["config", "script"]

[processor.ruff]
src_dirs = ["config", "script"]

[processor.shellcheck]
src_dirs = [ "src", "misc", "scripts"]
args = ["--severity=error", "--shell=bash"]
