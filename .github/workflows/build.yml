name: build
on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pages: write
  id-token: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/veltzer/demos-os-linux-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: rsconstruct version
      run: rsconstruct version
    - name: trust the workspace dir
      # Container runs as root; checkout dir is owned by the runner user.
      # Modern git refuses to operate on a tree owned by a different uid
      # ("dubious ownership"). Mark all dirs safe inside the container.
      run: git config --global --add safe.directory '*'
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
    - uses: actions/cache@v5
      with:
        path: .rsconstruct
        key: rsconstruct-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          rsconstruct-${{ runner.os }}-
    - name: install language tools
      run: rsconstruct tools install --yes
    - name: build
      # linux_module is excluded in CI: it builds against /lib/modules/$(uname -r)/build
      # which doesn't exist inside a container (no matching kernel headers for the host's
      # azure kernel). Run those demos on a real host.
      run: rsconstruct build -x linux_module
    - name: status
      run: rsconstruct status
