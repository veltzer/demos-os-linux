name: build
on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pages: write
  id-token: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/veltzer/demos-os-linux-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
    - uses: actions/cache@v5
      with:
        path: .rsconstruct
        key: rsconstruct-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          rsconstruct-${{ runner.os }}-
    - name: install language tools
      run: rsconstruct tools install --yes
    - name: build
      run: rsconstruct build -j0
    - name: status
      run: rsconstruct status
