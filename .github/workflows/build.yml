name: build
on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - uses: actions/setup-node@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
    - uses: actions/cache@v5
      with:
        path: .rsconstruct
        key: rsconstruct
    - name: install rsconstruct
      run: |
        gh release download --repo veltzer/rsconstruct --pattern 'rsconstruct-linux-x86_64' --output /usr/local/bin/rsconstruct
        chmod +x /usr/local/bin/rsconstruct
        rsconstruct version
      env:
        GH_TOKEN: ${{ github.token }}
    - name: install
      run: |
        rsconstruct tools install-deps --yes
        rsconstruct tools install --yes
    - name: build
      run: rsconstruct build -j0
    - name: status
      run: rsconstruct status
